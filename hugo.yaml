baseURL: https://rpniu.github.io/
title: My Site
hasCJKLanguage: true
enableGitInfo: true
enableInlineShortcodes: true

module:
  imports:
    - path: "github.com/imfing/hextra"

menu:
  main:
    - name: "主页"
      weight: 1
      pageRef: /
    - name: "文档"
      weight: 1
      pageRef: /docs
    - name: "博客"
      weight: 2
      pageRef: "/blog"
    - identifier: more
      name: "更多"
      weight: 3
    - identifier: "关于"
      name: "关于"
      pageRef: /about
      parent: more
    - identifier: "归档"
      name: "归档"
      pageRef: /archives
      parent: more
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/rpniu"
      params:
        icon: github

params:
  theme:
    # light | dark | system
    default: system
    displayToggle: true

  displayUpdatedDate: true
  dateFormat: "2006-1-2"
  
  imageZoom:
    enable: true

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide
    contextMenu:
      enable: true

outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

