baseURL: https://rpniu.github.io/
title: My Site
defaultContentLanguage: zh-cn
timeZone: Asia/Shanghai
hasCJKLanguage: true
enableGitInfo: true
enableInlineShortcodes: true

module:
  imports:
    - path: "github.com/imfing/hextra"

menu:
  main:
    - name: "主页"
      weight: 1
      pageRef: /
    - name: "文档"
      weight: 1
      pageRef: /docs
    - name: "博客"
      weight: 2
      pageRef: "/blog"
    - identifier: more
      name: "更多"
      weight: 3
    - identifier: about
      name: "关于"
      pageRef: /about
      parent: more
    - identifier: archives
      name: "归档"
      pageRef: /archives
      parent: more
    - identifier: links
      name: "友链"
      pageRef: /links
      parent: more
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/rpniu"
      params:
        icon: github

params:
  theme:
    # light | dark | system
    default: system
    displayToggle: true

  displayUpdatedDate: true
  dateFormat: "2006-1-2"
  
  imageZoom:
    enable: true

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide
    contextMenu:
      enable: true
  
  archives:
    section: ["blog", "docs"]
    dateFormat: "Jan 02"

  navigation:
    breadcrumb: true   # 开启顶部面包屑导航（如：Docs > 技术设计 > API）
    nextPrev: true     # 开启文章底部“上一篇/下一篇”导航
  editURL:
    enable: true
    base: "https://github.com/rpniu/rpniu.github.io/edit/main/content"

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    lineNos: true          # 开启代码块的行号
    lineNumbersInTable: true # 解决行号复制时的排版错位问题
    style: "github-dark"   # 设置代码高亮主题（可选 monokai, dracula, solarized-dark 等）
  
  tableOfContents:
    startLevel: 2          # 自动生成的目录从 H2 (##) 开始提取
    endLevel: 4            # 提取到 H4 (####) 结束

outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

