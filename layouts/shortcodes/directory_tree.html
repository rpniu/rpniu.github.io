{{- define "render-tree" -}}
  <ul class="hextra-dir-list">
    {{- range .Pages -}}
      <li class="{{ if .IsSection }}is-folder{{ else }}is-page{{ end }}">
        <a href="{{ .RelPermalink }}">
          {{- if .IsSection -}}
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hx-icon"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
          {{- else -}}
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hx-icon"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          {{- end -}}
          <span class="hx-title">{{ .Title }}</span>
        </a>
        {{- if .Pages -}}
          {{- template "render-tree" . -}}
        {{- end -}}
      </li>
    {{- end -}}
  </ul>
{{- end -}}

<div class="directory-tree-container">
  <style>
    .directory-tree-container {
      margin: 1.5rem 0;
      padding: 1rem;
      border-radius: 0.5rem;
      background-color: var(--hf-bg-color, rgba(150, 150, 150, 0.05));
      border: 1px solid var(--hf-border-color, rgba(150, 150, 150, 0.2));
    }
    .hextra-dir-list {
      list-style: none !important;
      padding-left: 1.25rem !important;
      margin: 0 !important;
    }
    .directory-tree-container > .hextra-dir-list {
      padding-left: 0 !important;
    }
    .hextra-dir-list li {
      margin-top: 0.5rem;
    }
    .hextra-dir-list a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      transition: background-color 0.2s ease;
    }
    .hextra-dir-list a:hover {
      background-color: rgba(150, 150, 150, 0.1);
      color: var(--primary-color, #2563eb);
    }
    .hextra-dir-list .hx-icon {
      color: #888;
      flex-shrink: 0;
    }
    .hextra-dir-list .is-folder > a .hx-icon {
      color: #facc15; /* 使文件夹图标有颜色 */
    }
    .hextra-dir-list .hx-title {
      font-weight: 500;
    }
  </style>

  {{- template "render-tree" .Page -}}
</div>
