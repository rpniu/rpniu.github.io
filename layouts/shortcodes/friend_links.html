<div class="friend-links-grid">
  {{ range .Site.Data.links }}
  <a class="friend-link-card" href="{{ .url }}" target="_blank" rel="noopener noreferrer">
    {{ $avatar := .avatar }}
    {{ if not $avatar }}
      {{ $avatar = printf "https://ui-avatars.com/api/?background=random&name=%s" .name }}
    {{ end }}
    <img src="{{ $avatar }}" alt="{{ .name }}" class="friend-link-avatar">
    <div class="friend-link-info">
      <div class="friend-link-name">{{ .name }}</div>
      <div class="friend-link-desc" title="{{ .desc }}">{{ .desc }}</div>
    </div>
  </a>
  {{ end }}
</div>

<style>
  .friend-links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1.25rem;
    margin-top: 2rem;
    margin-bottom: 2rem;
  }
  .friend-link-card {
    display: flex;
    align-items: center;
    padding: 1rem;
    border: 1px solid rgba(150, 150, 150, 0.2);
    border-radius: 0.75rem;
    text-decoration: none !important;
    color: inherit;
    transition: all 0.2s ease;
    background: rgba(150, 150, 150, 0.03);
  }
  .friend-link-card:hover {
    background: rgba(150, 150, 150, 0.1);
    transform: translateY(-2px);
    border-color: rgba(150, 150, 150, 0.4);
  }
  .friend-link-avatar {
    width: 3rem;
    height: 3rem;
    border-radius: 50%;
    margin: 0 1rem 0 0;
    object-fit: cover;
  }
  .friend-link-info {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    width: 100%;
  }
  .friend-link-name {
    font-weight: 600;
    font-size: 1.05rem;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  .friend-link-desc {
    font-size: 0.85rem;
    opacity: 0.7;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    margin-top: 0.2rem;
  }
</style>
